{% extends "base.html" %}
    {% block main %}
    <button><a href="{{ url_for('index') }}">Go back to the game!</a></button>

    <p><i>Your past games</i></p>
    {%if results%}
        <ol>
            {%for result in results%}
            <li>
                {{result["user_id"]}} 
                {{ result["score"] }}
            </li>
            {%endfor%}
        </ol>
    {%else %}
        <p><i>No past games. Play to gain some.</i></p>
    {%endif%}

{% endblock %}
