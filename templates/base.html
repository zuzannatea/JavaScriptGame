<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='main.css') }}"/>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static',filename='console.ico') }}">
    <script>
        let URLS = {
            logout: "{{ url_for('logout') }}",
            leaderboard: "{{ url_for('leaderboard') }}",
            register: "{{ url_for('register') }}",
            rules: "{{ url_for('rules') }}",
            credits: "{{ url_for('credits') }}",
            index: "{{ url_for('index') }}",
            continue_as_guest: "{{ url_for('continue_as_guest') }}"
        };
</script>

    {% block head %}
    {% endblock %}
</head>
<body>
    <header>
        {% if g.user %}
            <p><a href="{{ url_for('profile') }}">{{g.user}}</a></p>
            <p><a href="{{ url_for('leaderboard') }}">Leaderboard</a></p>
            <p><a href="{{ url_for('logout') }}">Logout </a></p>
        {%else %}
            <p><a href="{{ url_for('leaderboard') }}">Leaderboard</a></p>
            <p><a href="{{ url_for('register') }}">Register</a></p>
            <p><a href="{{ url_for('login') }}">Login</a></p>

        {% endif %}

    </header>
    {% block main %}
    {% endblock %}
</body>
</html>
